  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er-events: auto; }\n\n  .wordmark {\n    font-family: 'Geist', sans-serif;\n    font-size: 17px;\n    font-weight: 500;\n    letter-spacing: -0.01em;\n    line-height: 1;\n    transition: opacity 600ms ease;\n  }\n  .wordmark .dot {\n    display: inline-block;\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: currentColor;\n    vertical-align: middle;\n    margin: 0 6px 2px 6px;\n  }\n\n  .meta {\n    font-family: 'Geist', sans-serif;\n    font-size: 13px;\n    font-weight: 400;\n    letter-spacing: 0.02em;\n    text-align: right;\n    line-height: 1.8;\n    opacity: 0.7;\n    transition: opacity 600ms ease;\n  }\n  .meta a {\n    color: inherit;\n    text-decoration: none;\n    border-bottom: 1px solid currentColor;\n    padding-bottom: 1px;\n    transition: opacity 200ms ease;\n  }\n  .meta a:hover { opacity: 0.55; }\n  body.immersive .meta { opacity: 0; pointer-events: none; }\n\n  /* Hero caption \u2014 centered like a sun */\n  .hero {\n    position: fixed;\n    left: 50%;\n    top: 50%;\n    transform: translate(-50%, -50%);\n    text-align: center;\n    z-index: 4;\n    pointer-events: none;\n    transition: opacity 600ms ease;\n  }\n  .hero .lead {\n    font-family: 'Geist', sans-serif;\n    font-weight: 300;\n    font-size: 13px;\n    letter-spacing: 0.04em;\n    color: var(--ink-soft);\n    white-space: nowrap;\n  }\n  body.immersive .hero { opacity: 0; }\n\n  /* Stage */\n  .bg-overlay {\n    position: fixed;\n    inset: 0;\n    z-index: 0;\n    pointer-events: none;\n    opacity: 0;\n    transition: opacity 700ms cubic-bezier(0.5, 0, 0.35, 1);\n  }\n  body.immersive .bg-overlay { opacity: 1; }\n\n  .stage {\n    position: fixed;\n    inset: 0;\n    z-index: 2;\n  }\n\n  /* Orbit guide \u2014 very faint, only appears subtly */\n  .orbit-guide {\n    position: fixed;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    z-index: 1;\n    pointer-events: none;\n    opacity: 0.5;\n    transition: opacity 800ms ease;\n  }\   background: currentColor;\n    opacity: 0.9;\n    cursor: grab;\n    transition: transform 80ms;\n  }\n  .progress .playhead:active { cursor: grabbing; transform: translate(-50%,-50%) scale(1.25); }\n  .progress .fill {\n    position: absolute;\n    inset: 0;\n    width: 0%;\n    background: currentColor;\n    opacity: 0.75;\n  }\n  .progress .times {\n    display: flex;\n    justify-content: space-between;\n    margin-top: 10px;\n    font-family: 'Geist', sans-serif;\n    font-size: 11px;\n    letter-spacing: 0.02em;\n    opacity: 0.55;\n  }\n\n  .close-hint {\n    position: fixed;\n    top: calc(50% + 28px);\n    left: 50%;\n    transform: translateX(-50%);\n    font-family: 'Geist', sans-serif;\n    font-size: 10px;\n    font-weight: 400;\n    letter-spacing: 0.1em;\n    z-index: 30;\n    opacity: 0;\n    transition: opacity 700ms ease 800ms;\n    pointer-events: none;\n  }\n  body.immersive .close-hint { opacity: 0.4; }\n\n  /* Tweaks */\n  .tweaks {\n    position: fixed;\n    bottom: 24px;\n    right: 24px;\n    background: oklch(0.22 0.02 60 / 0.92);\n    color: oklch(0.97 0 0);\n    padding: 18px 20px;\n    border-radius: 12px;\n    font-family: 'Geist', sans-serif;\n    font-size: 11px;\n    letter-spacing: 0.01em;\n    z-index: 100;\n    display: none;\n    min-width: 220px;\n    backdrop-filter: blur(12px);\n  }\n  .tweaks.open { display: block; }\n  .tweaks h4 {\n    font-size: 11px;\n    letter-spacing: 0.05em;\n    margin-bottom: 12px;\n    opacity: 0.6;\n    font-weight: 500;\n  }\n  .tweaks .row {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    margin-bottom: 10px;\n    gap: 12px;\n  }\n  .tweaks label { opacity: 0.8; }\n  .tweaks input[type=\"range\"] { width: 100px; accent-color: oklch(0.75 0.15 80); }\n  .tweaks select {\n    background: oklch(0.28 0.02 60);\n    color: inherit;\n    border: 1px solid oklch(1 0 0 / 0.15);\n    padding: 3px 6px;\n    font: inherit;\n    border-radius: 4px;\n  }\n<\/style>\n<\/head>\n<body>\n\n  <header class=\"chrome\">\n    <div class=\"wordmark\">Soojeong Kim <span class=\"dot\"><\/span> sound portfolio<\/div>\n    <div class=\"meta\">\n      <div>selected works<\/div>\n      <div>2022\u2009\u2013\u20092026<\/div>\n      <div><a href=\"mailto:soojaamee@gmail.com\">soojaamee@gmail.com<\/a><\/div>\n    <\/div>\n  <\/header>\n\n  <svg class=\"orbit-guide\" id=\"orbitGuide\" width=\"800\" height=\"800\" viewBox=\"0 0 800 800\">\n    <circle cx=\"400\" cy=\"400\" r=\"340\"><\/circle>\n  <\/svg>\n\n  <div id=\"bgOverlay\" class=\"bg-overlay\"><\/div>\n\n  <div class=\"stage\" id=\"stage\"><\/div>\n\n  <div class=\"halo\" id=\"halo\"><\/div>\n\n  <div class=\"hero\">\n    <div class=\"lead\">click a shape to listen<\/div>\n  <\/div>\n\n  <div class=\"now-playing\" id=\"nowPlaying\">\n    <div class=\"np-title\">\n      <span id=\"npTitle\">\u2014<\/span>\n    <\/div>\n  <\/div>\n\n  <div class=\"close-hint\">esc to close<\/div>\n\n  <div class=\"progress\" id=\"progress\">\n    <div class=\"bar\" id=\"progressBar\"><div class=\"fill\" id=\"progressFill\"><\/div><div class=\"playhead\" id=\"playhead\"><\/div><\/div>\n    <div class=\"times\">\n      <span id=\"progressCur\">0:00<\/span>\n      <span id=\"progressDur\">0:00<\/span>\n    <\/div>\n  <\/div>\n\n  <button id=\"playPauseBtn\" class=\"play-pause-btn\" aria-label=\"pause\">\n    <svg id=\"pauseIcon\" width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"currentColor\">\n      <rect x=\"2\" y=\"1\" width=\"4\" height=\"12\" rx=\"1.5\"/>\n      <rect x=\"8\" y=\"1\" width=\"4\" height=\"12\" rx=\"1.5\"/>\n    <\/svg>\n    <svg id=\"playIcon\" width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"currentColor\" style=\"display:none\">\n      <path d=\"M3 1.5l9 5.5-9 5.5V1.5z\"/>\n    <\/svg>\n  <\/button>\n\n  <div class=\"tweaks\" id=\"tweaks\">\n    <h4>tweaks<\/h4>\n    <div class=\"row\">\n      <label>reactivity<\/label>\n      <input type=\"range\" id=\"tw-reactivity\" min=\"0.3\" max=\"2.5\" step=\"0.1\" value=\"1.5\">\n    <\/div>\n    <div class=\"row\">\n      <label>orbit speed<\/label>\n      <input type=\"range\" id=\"tw-drift\" min=\"0.2\" max=\"2.5\" step=\"0.1\" value=\"1\">\n    <\/div>\n    <div class=\"row\">\n      <label>shape size<\/label>\n      <input type=\"range\" id=\"tw-size\" min=\"0.7\" max=\"1.6\" step=\"0.05\" value=\"1\">\n    <\/div>\n    <div class=\"row\">\n      <label>background<\/label>\n      <select id=\"tw-bg\">\n        <option value=\"oklch(0.965 0.018 85)\">cream<\/option>\n        <option value=\"oklch(0.955 0.01 70)\">warm ivory<\/option>\n        <option value=\"oklch(0.97 0.005 100)\">paper<\/option>\n        <option value=\"oklch(0.93 0.02 55)\">sand<\/option>\n      <\/select>\n    <\/div>\n  <\/div>\n\n<script>\n/* =========================================================\n   sound portfolio \u2014 solar-system orbit + multi-color grads\n   ========================================================= */\n\n/* Each track defines a gradient trio:\n   - g1/g2/g3: three color stops (outer \u2192 mid \u2192 inner glow)\n   - type: 'linear' | 'radial' \u2014 some shapes read better with a\n     diagonal linear gradient, others with an offset radial.\n   - tint: very soft background wash when active\n*/\n/* Multi-hue palettes \u2014 each track mixes distant hues on the color wheel\n   (e.g. pink+yellow, blue+green, coral+amber) for the reference's\n   playful, painterly feel. g1=deep edge, g2=mid, g3=inner glow. */\n/* Cross-hue pastel mixes \u2014 each gradient spans far-apart hues */\n/* Each shape has ONE signature color + 2-3 blended companions.\n   Signatures: pink, yellow, mint, green, brown, purple \u2014 all distinct.\n   Gradients keep the main hue dominant so identity reads at a glance. */\nconst TRACKS = [\n  { id: 0, title: 'body and soul',\n    c1:'#FF6E5A', c2:'#FFBF4A', c3:'#FFAABF',\n    type:'radial', src:'./music/body and soul.wav' },\n  { id: 1, title: 'childhood memory',\n    c1:'#FFA6E9', c2:'#FFD87A', c3:'#B8F07A',\n    type:'linear', src:'./music/childhood memory.wav' },\n  { id: 2, title: 'clockwalk',\n    c1:'#FFC07A', c2:'#FF9AE5', c3:'#A78BFA',\n    type:'radial', src:'./music/clockwalk.wav' },\n  { id: 3, title: 'marble drop',\n    c1:'#FFB07A', c2:'#FF7DAE', c3:'#7EE5B7',\n    type:'linear', src:'./music/marble drop.wav' },\n  { id: 4, title: 'pool dive',\n    c1:'#65E6FF', c2:'#A3E4FF', c3:'#F3ABEA',\n    type:'radial', src:'./music/pool dive.wav' },\n  { id: 5, title: 'requiem',\n    c1:'#FFD87A', c2:'#7EE5B7', c3:'#A78BFA',\n    type:'linear', src:'./music/requiem.wav' },\n];\n\n/* ---- Gradient defs (Gaussian multi-color blend) ---- */\nfunction defs(id, track) {\n  const { c1, c2, c3 } = track;\n  const bid = `bf${id}`;\n  return `<defs>\n    <filter id=\"${bid}\" x=\"-100%\" y=\"-100%\" width=\"300%\" height=\"300%\" color-interpolation-filters=\"sRGB\">\n      <feGaussianBlur stdDeviation=\"24\"/>\n    <\/filter>\n    <pattern id=\"${id}\" patternUnits=\"userSpaceOnUse\" x=\"-80\" y=\"-80\" width=\"160\" height=\"160\">\n      <rect width=\"160\" height=\"160\" fill=\"${c2}\"/>\n      <circle cx=\"30\" cy=\"35\" r=\"75\" fill=\"${c1}\" filter=\"url(#${bid})\" opacity=\"0.88\"/>\n      <circle cx=\"122\" cy=\"118\" r=\"70\" fill=\"${c3}\" filter=\"url(#${bid})\" opacity=\"0.82\"/>\n      <circle cx=\"26\" cy=\"122\" r=\"55\" fill=\"${c3}\" filter=\"url(#${bid})\" opacity=\"0.38\"/>\n      <circle cx=\"122\" cy=\"28\" r=\"52\" fill=\"${c1}\" filter=\"url(#${bid})\" opacity=\"0.38\"/>\n      <circle cx=\"55\" cy=\"42\" r=\"44\" fill=\"white\" filter=\"url(#${bid})\" opacity=\"0.14\"/>\n    <\/pattern>\n  <\/defs>`;\n}\nconst F = (id) => `fill=\"url(#${id})\"`;\n\n/* 6 distinct shapes \u2014 4-fold rotational symmetry where possible,\n   all inscribed in the \u00b170 bounding box, all use ONE closed path\n   so the gradient flows cleanly. Visual weight equalized by\n   targeting ~60-70% ink coverage inside the bbox. */\nconst SHAPES = {\n  // Sun \u2014 tight disk surrounded by many slim radiating spikes (ref-style #3)\n  sun: (id, t) => {\n    const R_IN = 26, R_OUT = 68, N = 24; // more rays, thinner\n    let d = '';\n    for (let k = 0; k < N; k++) {\n      const a0 = (k / N) * Math.PI * 2;\n      const a1 = ((k + 0.18) / N) * Math.PI * 2;  // narrower spike\n      const a2 = ((k + 0.82) / N) * Math.PI * 2;\n      const p0x = Math.cos(a0) * R_IN,  p0y = Math.sin(a0) * R_IN;\n      const p1x = Math.cos(a1) * R_OUT, p1y = Math.sin(a1) * R_OUT;\n      const p2x = Math.cos(a2) * R_OUT, p2y = Math.sin(a2) * R_OUT;\n      d += (k === 0 ? `M ${p0x.toFixed(2)} ${p0y.toFixed(2)} ` : `L ${p0x.toFixed(2)} ${p0y.toFixed(2)} `);\n      d += `L ${p1x.toFixed(2)} ${p1y.toFixed(2)} L ${p2x.toFixed(2)} ${p2y.toFixed(2)} `;\n    }\n    d += 'Z';\n    return `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <circle class=\"g-el\" cx=\"0\" cy=\"0\" r=\"30\" ${F(id)}/>\n      <path class=\"g-el\" d=\"${d}\" ${F(id)}/>\n    <\/svg>`;\n  },\n  // Hourglass \u2014 two mirrored concave triangles\n  hourglass: (id, t) => `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <path class=\"g-el\" d=\"M -66 -64 L 66 -64 Q 10 -20, 10 0 Q 10 20, 66 64 L -66 64 Q -10 20, -10 0 Q -10 -20, -66 -64 Z\" ${F(id)}/>\n    <\/svg>`,\n  // Quatrefoil \u2014 4-lobed cloud (soft round petals, 4-fold symmetry)\n  quatrefoil: (id, t) => `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <path class=\"g-el\" d=\"M 0 -70 C 22 -70, 38 -54, 32 -32 C 54 -38, 70 -22, 70 0 C 70 22, 54 38, 32 32 C 38 54, 22 70, 0 70 C -22 70, -38 54, -32 32 C -54 38, -70 22, -70 0 C -70 -22, -54 -38, -32 -32 C -38 -54, -22 -70, 0 -70 Z\" ${F(id)}/>\n    <\/svg>`,\n  // Rounded square \u2014 plump squircle, 4-fold symmetry (replaces former 4-petal)\n  squircle: (id, t) => `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <path class=\"g-el\" d=\"M -36 -68 L 36 -68 Q 68 -68, 68 -36 L 68 36 Q 68 68, 36 68 L -36 68 Q -68 68, -68 36 L -68 -36 Q -68 -68, -36 -68 Z\" ${F(id)}/>\n    <\/svg>`,\n  // Zigzag bolt square \u2014 chevron top & bottom\n  zigzag: (id, t) => `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <path class=\"g-el\" d=\"M -64 -60 L -32 -30 L 0 -60 L 32 -30 L 64 -60 L 64 60 L 32 30 L 0 60 L -32 30 L -64 60 Z\" ${F(id)}/>\n    <\/svg>`,\n  // 4-point concave star \u2014 squircle with inward-curved sides\n  star4: (id, t) => `\n    <svg viewBox=\"-80 -80 160 160\">${defs(id,t)}\n      <path class=\"g-el\" d=\"M 0 -70 Q 10 -10, 70 0 Q 10 10, 0 70 Q -10 10, -70 0 Q -10 -10, 0 -70 Z\" ${F(id)}/>\n    <\/svg>`,\n};\nconst SHAPE_ORDER = ['sun','hourglass','quatrefoil','squircle','zigzag','star4'];\n\n/* ---- State ---- */\nconst state = {\n  shapes: [],\n  activeId: null,\n  audioCtx: null,\n  analyser: null,\n  freqData: null,\n  timeData: null,\n  source: null,\n  gainNode: null,\n  audio: null,\n  playing: false,\n  reactivity: 1.5,\n  driftSpeed: 1,     // now \"orbit speed\"\n  sizeScale: 1,\n  t: 0,\n  t0: null,\n  simProgress: 0,\n  simDuration: 240,\n  orbitRotation: 0,  // base orbit angle\n  fadingOut: false,\n};\n\n/* ---- Orbit geometry ---- */\nfunction orbitRadius() {\n  return Math.min(window.innerWidth, window.innerHeight) * 0.36;\n}\n\nfunction buildShapes() {\n  const stage = document.getElementById('stage');\n  stage.innerHTML = '';\n  state.shapes = [];\n\n  // Scramble spin speeds & directions so fast/slow are interleaved\n  // around the orbit (not clustered on one side).\n  const spinSpeeds = [22, 9, 16, 30, 12, 25, 7, 18];   // deg/sec\n  const spinDirs   = [ 1, -1, 1, -1, -1,  1, 1, -1];\n\n  TRACKS.forEach((t, i) => {\n    const el = document.createElement('div');\n    el.className = 'shape';\n    el.dataset.id = t.id;\n    const gid = `g${t.id}`;\n    el.innerHTML = SHAPES[SHAPE_ORDER[i]](gid, t);\n    stage.appendChild(el);\n\n    const size = 156; // uniform size across all shapes\n    el.style.width = size + 'px';\n    el.style.height = size + 'px';\n\n    const slotAngle = (i / TRACKS.length) * Math.PI * 2;\n    const radialWobbleFreq = 0.12 + (i % 4) * 0.03;\n    const radialWobbleAmp = 0.04 + (i % 3) * 0.015;\n\n    state.shapes.push({\n      id: t.id,\n      el,\n      track: t,\n      size,\n      slotAngle,\n      spinSpeed: spinSpeeds[i],\n      spinDir: spinDirs[i],\n      radialWobbleFreq,\n      radialWobbleAmp,\n      spinPhase: Math.random() * 360,\n    });\n\n    el.addEventListener('click', (e) => {\n      e.stopPropagation();\n      toggleTrack(t.id);\n    });\n  });\n\n  updateOrbitGuide();\n}\n\nfunction updateOrbitGuide() {\n  const og = document.getElementById('orbitGuide');\n  const r = orbitRadius();\n  const d = r * 2 + 40;\n  og.setAttribute('width', d);\n  og.setAttribute('height', d);\n  og.setAttribute('viewBox', `0 0 ${d} ${d}`);\n  og.querySelector('circle').setAttribute('cx', d / 2);\n  og.querySelector('circle').setAttribute('cy', d / 2);\n  og.querySelector('circle').setAttribute('r', r);\n}\n\n/* ---- Animation ---- */\nfunction tick(ts) {\n  if (!state.t0) state.t0 = ts;\n  const t = (ts - state.t0) / 1000;\n  state.t = t;\n\n  // audio data\n  let bass=0, mid=0, treble=0, rms=0;\n  if (state.analyser && state.playing) {\n    state.analyser.getByteFrequencyData(state.freqData);\n    const n = state.freqData.length;\n    const bassEnd = Math.floor(n*0.08), midEnd = Math.floor(n*0.35);\n    let bS=0,mS=0,tS=0;\n    for (let i=0;i<bassEnd;i++) bS+=state.freqData[i];\n    for (let i=bassEnd;i<midEnd;i++) mS+=state.freqData[i];\n    for (let i=midEnd;i<n;i++) tS+=state.freqData[i];\n    bass=bS/bassEnd/255; mid=mS/(midEnd-bassEnd)/255; treble=tS/(n-midEnd)/255;\n    state.analyser.getByteTimeDomainData(state.timeData);\n    let sq=0;\n    for (let i=0;i<state.timeData.length;i++){const v=(state.timeData[i]-128)/128;sq+=v*v;}\n    rms = Math.sqrt(sq/state.timeData.length);\n  } else if (state.playing) {\n    bass=(Math.sin(t*2.3)+1)*0.28+0.12;\n    mid=(Math.sin(t*3.7+1.2)+1)*0.22+0.08;\n    treble=(Math.sin(t*5.1+2.4)+1)*0.18+0.08;\n    rms=0.22+Math.sin(t*4)*0.1;\n  }\n\n  // progress\n  if (state.audio && state.audio.duration && !window._seekDragging) {\n    const cur=state.audio.currentTime, dur=state.audio.duration;\n    document.getElementById('progressFill').style.width = (cur/dur*100)+'%';\n    document.getElementById('playhead').style.left = (cur/dur*100)+'%';\n    document.getElementById('progressCur').textContent = fmtTime(cur);\n    document.getElementById('progressDur').textContent = fmtTime(dur);\n  } else if (state.playing) {\n    state.simProgress += 1/60;\n    if (state.simProgress > state.simDuration) state.simProgress = 0;\n    document.getElementById('progressFill').style.width = (state.simProgress/state.simDuration*100)+'%';\n    document.getElementById('progressCur').textContent = fmtTime(state.simProgress);\n    document.getElementById('progressDur').textContent = fmtTime(state.simDuration);\n  }\n\n  // Whole orbit rotates VERY slowly\n  const orbitAngularSpeed = 0.035 * state.driftSpeed; // rad/sec\n  state.orbitRotation += orbitAngularSpeed * (1/60);\n\n  const cx = window.innerWidth / 2;\n  const cy = window.innerHeight / 2;\n  const baseR = orbitRadius();\n\n  state.shapes.forEach((s) => {\n    const isActive = state.activeId === s.id;\n\n    // Each shape's position on the great orbit\n    const wobble = Math.sin(t * s.radialWobbleFreq + s.slotAngle) * s.radialWobbleAmp;\n    const r = baseR * (1 + wobble);\n    const angle = s.slotAngle + state.orbitRotation;\n    const orbitX = cx + Math.cos(angle) * r;\n    const orbitY = cy + Math.sin(angle) * r;\n\n    // Self-spin (each shape rotates in place at its own speed)\n    let spin = s.spinPhase + s.spinSpeed * s.spinDir * t * state.driftSpeed;\n\n    // Base scale\n    let scale = state.sizeScale;\n    const skew = 0; // tilt effect removed\n\n    // Audio reactivity on active shape\n    if (isActive && state.playing) {\n      const rct = state.reactivity;\n      // NOTE: keep active shape at its natural size (no growth)\n      spin += (mid - 0.3) * 30 * rct;\n      s.el.querySelectorAll('svg .g-el').forEach((node, k) => {\n        const sc = 1 + (bass * 0.18 + treble * 0.1 * (k % 2 ? -1 : 1)) * rct;\n        const rot = (mid * 30 - 15) * rct * (k % 2 ? 1 : -1);\n        node.style.transform = `scale(${sc}) rotate(${rot}deg)`;\n      });\n    } else if (state.playing) {\n      // Subtle group breathing\n      scale *= 1 + rms * 0.05;\n    } else {\n      s.el.querySelectorAll('svg .g-el').forEach(n => { n.style.transform = ''; });\n    }\n\n    // Always orbit \u2014 active shape fades out in place via CSS\n    const x = orbitX - s.size / 2;\n    const y = orbitY - s.size / 2;\n    s.el.style.transform = `translate(${x}px, ${y}px) rotate(${spin}deg) scale(${scale}) skewX(${skew}deg)`;\n  });\n\n  requestAnimationFrame(tick);\n}\n\nfunction fmtTime(s) {\n  if (!isFinite(s)) return '0:00';\n  const m = Math.floor(s/60), ss = Math.floor(s%60);\n  return `${m}:${String(ss).padStart(2,'0')}`;\n}\n\n/* ---- Audio ---- */\nfunction ensureAudio() {\n  if (state.audioCtx) return;\n  const AC = window.AudioContext || window.webkitAudioContext;\n  state.audioCtx = new AC();\n  state.analyser = state.audioCtx.createAnalyser();\n  state.analyser.fftSize = 512;\n  state.freqData = new Uint8Array(state.analyser.frequencyBinCount);\n  state.timeData = new Uint8Array(state.analyser.fftSize);\n}\n\nfunction burstHalo(track) {\n  const halo = document.getElementById('halo');\n  halo.style.background = `radial-gradient(circle, ${track.c2} 0%, ${track.c1} 40%, transparent 70%)`;\n  halo.classList.remove('burst');\n  // reflow to restart animation\n  void halo.offsetWidth;\n  halo.classList.add('burst');\n}\n\nfunction toggleTrack(id) {\n  const track = TRACKS.find(t => t.id === id);\n  if (state.activeId === id) { closeImmersive(); return; }\n\n  state.activeId = id;\n  state.playing = true;\n  state.simProgress = 0;\n  document.body.classList.add('immersive');\n  // \ubc30\uacbd \uadf8\ub77c\ub514\uc5b8\ud2b8\n  const _bg = track.type === 'radial'\n    ? `radial-gradient(ellipse at 35% 30%, ${track.c1} 0%, ${track.c2} 50%, ${track.c3} 100%)`\n    : `linear-gradient(135deg, ${track.c1} 0%, ${track.c2} 50%, ${track.c3} 100%)`;\n  document.getElementById('bgOverlay').style.background = _bg;\n\n  // Halo burst effect\n  burstHalo(track);\n\n  state.shapes.forEach(s => s.el.classList.toggle('active', s.id === id));\n  document.getElementById('npTitle').textContent = track.title;\n  document.getElementById('pauseIcon').style.display = '';\n  document.getElementById('playIcon').style.display = 'none';\n\n  ensureAudio();\n  if (state.audio) { state.audio.pause(); state.audio = null; state.gainNode = null; }\n\n  if (track.src) {\n    state.audio = new Audio(track.src);\n    state.audio.crossOrigin = 'anonymous';\n    state.audio.loop = false;\n    state.fadingOut = false;\n    state.audio.addEventListener('timeupdate', () => {\n      if (!state.fadingOut && !window._seekDragging && state.gainNode && state.audioCtx\n          && state.audio && state.audio.duration\n          && (state.audio.duration - state.audio.currentTime) <= 1.5\n          && state.audio.currentTime > 0.5) {\n        state.fadingOut = true;\n        const g = state.gainNode.gain;\n        const now = state.audioCtx.currentTime;\n        const remaining = state.audio.duration - state.audio.currentTime;\n        g.cancelScheduledValues(now);\n        g.setValueAtTime(Math.max(g.value, 0.0001), now);\n        g.exponentialRampToValueAtTime(0.0001, now + Math.max(remaining, 0.05));\n      }\n    });\n    state.audio.addEventListener('ended', () => {\n      requestAnimationFrame(() => {\n        if (state.activeId === null) return;\n        state.activeId = null;\n        state.playing = false;\n        document.body.classList.remove('immersive');\n        document.documentElement.style.setProperty('--bg', window._currentBg || 'oklch(0.965 0.018 85)');\n        state.shapes.forEach(s => {\n          s.el.classList.remove('active');\n          s.el.querySelectorAll('svg .g-el').forEach(n => { n.style.transform = ''; });\n        });\n        state.audio = null;\n        state.gainNode = null;\n        state.fadingOut = false;\n      });\n    });\n    state.source = state.audioCtx.createMediaElementSource(state.audio);\n    state.gainNode = state.audioCtx.createGain();\n    state.gainNode.gain.setValueAtTime(0.0001, state.audioCtx.currentTime);\n    state.gainNode.gain.exponentialRampToValueAtTime(1, state.audioCtx.currentTime + 1.5);\n    state.source.connect(state.gainNode);\n    state.gainNode.connect(state.analyser);\n    state.analyser.connect(state.audioCtx.destination);\n    state.audio.play().catch(err => console.warn('audio play failed', err));\n  } else {\n    console.info(`[demo] track \"${track.title}\" \u2014 no src; using simulated waveform.`);\n  }\n}\n\nfunction closeImmersive() {\n  state.activeId = null;\n  state.playing = false;\n  document.body.classList.remove('immersive');\n  document.documentElement.style.setProperty('--bg', window._currentBg || 'oklch(0.965 0.018 85)');\n  state.shapes.forEach(s => {\n    s.el.classList.remove('active');\n    s.el.querySelectorAll('svg .g-el').forEach(n => { n.style.transform = ''; });\n  });\n  if (state.audio) {\n    const _audioToStop = state.audio;\n    const _gn = state.gainNode;\n    const _ctx = state.audioCtx;\n    state.audio = null;\n    state.gainNode = null;\n    if (_gn && _ctx && _ctx.state === 'running') {\n      const g = _gn.gain;\n      const now = _ctx.currentTime;\n      g.cancelScheduledValues(now);\n      g.setValueAtTime(Math.max(g.value, 0.0001), now);\n      g.exponentialRampToValueAtTime(0.0001, now + 1.5);\n      setTimeout(() => { try { _audioToStop.pause(); } catch(e) {} }, 1600);\n    } else {\n      _audioToStop.pause();\n    }\n  }\n}\n\ndocument.addEventListener('click', (e) => {\n  if (window._seekDragging || window._seekJustDragged) return;\n  if (state.activeId !== null && !e.target.closest('.shape') && !e.target.closest('.tweaks') && !e.target.closest('.progress') && !e.target.closest('.play-pause-btn')) {\n    closeImmersive();\n  }\n});\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'Escape' && state.activeId !== null) closeImmersive();\n});\nwindow.addEventListener('resize', updateOrbitGuide);\n\n/* ---- Tweaks ---- */\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"reactivity\": 2.5,\n  \"driftSpeed\": 0.6,\n  \"sizeScale\": 0.8,\n  \"background\": \"oklch(0.965 0.018 85)\"\n}/*EDITMODE-END*/;\n\nfunction applyTweaks(t) {\n  state.reactivity = t.reactivity;\n  state.driftSpeed = t.driftSpeed;\n  state.sizeScale = t.sizeScale;\n  window._currentBg = t.background;\n  if (state.activeId === null) document.documentElement.style.setProperty('--bg', t.background);\n  document.getElementById('tw-reactivity').value = t.reactivity;\n  document.getElementById('tw-drift').value = t.driftSpeed;\n  document.getElementById('tw-size').value = t.sizeScale;\n  document.getElementById('tw-bg').value = t.background;\n}\napplyTweaks(TWEAK_DEFAULTS);\n\nfunction wireTweak(id, key, parse = parseFloat) {\n  const el = document.getElementById(id);\n  el.addEventListener('input', () => {\n    const val = parse(el.value);\n    if (key === 'reactivity') state.reactivity = val;\n    if (key === 'driftSpeed') state.driftSpeed = val;\n    if (key === 'sizeScale') state.sizeScale = val;\n    if (key === 'background') {\n      window._currentBg = val;\n      if (state.activeId === null) document.documentElement.style.setProperty('--bg', val);\n    }\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');\n  });\n}\nwireTweak('tw-reactivity','reactivity');\nwireTweak('tw-drift','driftSpeed');\nwireTweak('tw-size','sizeScale');\nwireTweak('tw-bg','background', v => v);\n\nwindow.addEventListener('message', (e) => {\n  const d = e.data || {};\n  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');\n  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\nwindow._seekDragging = false;\n(function() {\n  const progressEl = document.getElementById('progress');\n  const bar = document.getElementById('progressBar');\n  let pendingPct = null, rafId = null;\n\n  function setDrag(v) { window._seekDragging = v; }\n\n  function applySeek(pct) {\n    if (!state.audio || !state.audio.duration) return;\n    state.audio.currentTime = pct * state.audio.duration;\n    if (state.gainNode && state.audioCtx) {\n      state.fadingOut = false;\n      const g = state.gainNode.gain;\n      g.cancelScheduledValues(state.audioCtx.currentTime);\n      g.setValueAtTime(1, state.audioCtx.currentTime);\n    }\n  }\n\n  function updateVisual(pct) {\n    const p = (pct * 100) + '%';\n    document.getElementById('progressFill').style.width = p;\n    document.getElementById('playhead').style.left = p;\n    if (state.audio && state.audio.duration)\n      document.getElementById('progressCur').textContent = fmtTime(pct * state.audio.duration);\n  }\n\n  function seekTo(clientX) {\n    if (!state.audio || !state.audio.duration) return;\n    const rect = bar.getBoundingClientRect();\n    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));\n    updateVisual(pct);\n    pendingPct = pct;\n    if (!rafId) rafId = requestAnimationFrame(() => {\n      rafId = null;\n      if (pendingPct !== null) { applySeek(pendingPct); pendingPct = null; }\n    });\n  }\n\n  function endDrag() {\n    if (!window._seekDragging) return;\n    setDrag(false);\n    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }\n    if (pendingPct !== null) { applySeek(pendingPct); pendingPct = null; }\n    if (state.audio && state.audioCtx && state.playing) {\n      state.audioCtx.resum
